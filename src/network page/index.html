<!DOCTYPE html>

<head>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"

    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"

    <link

        href="style.css"
    >

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
        <div class="container-fluid">

                <a class="navbar-brand fw-bold" href="index.html">
                    College Connect
                </a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                    aria-controls="navbarNav"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">

                    <ul class="navbar-nav ms-auto">

                        <li class="nav-item">
                            <a class="nav-link active" href="index.html">
                                Home
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="../profile page/index.html">
                                Profile
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="../network page/index.html">
                                Network
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                Help
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link text-danger" href="../login page/index.html">
                                Logout
                            </a>
                        </li>

                    </ul>

                </div>

        </div>
    </nav>

    <!-- Main Content -->

    <div class="container mt-5">

        <h1 class="text-center mb-4">
            Student Network
        </h1>

        <p class="text-center text-muted mb-5">
            Discover and connect with students from your college.
        </p>

        <!-- Search Bar -->

        <div class="row justify-content-center mb-4">

            <div class="col-md-6">

                <input
                    id="searchInput"
                    type="text"
                    class="form-control"
                    placeholder="Search by name, branch or skill..."
                >

            </div>

        </div>

        <!-- Student Cards -->

        <div
            id="studentsContainer"
            class="row g-4"
        >

            <!-- Cards will be generated by JavaScript -->

        </div>

    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
    ></script>

    <script src="script.js"></script>
