<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Connect - Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="register-container d-flex flex-column justify-content-center align-items-center">

        <h1 class="mb-4">Create Your Account</h1>

        <div class="register-card">

            <h5>Full Name</h5>
            <input id="fullName" type="text" class="form-control" placeholder="Enter Full Name">
            <p id="nameError" class="error-message"></p>

            <h5>Email</h5>
            <input id="email" type="email" class="form-control" placeholder="Enter Email">
            <p id="emailError" class="error-message"></p>

            <h5>User ID</h5>
            <input id="userId" type="text" class="form-control" placeholder="Create User ID">
            <p id="userIdError" class="error-message"></p>

            <h5>Password</h5>
            <input id="password" type="password" class="form-control" placeholder="Create Password">
            <p id="passwordError" class="error-message"></p>

            <h5>Confirm Password</h5>
            <input id="confirmPassword" type="password" class="form-control" placeholder="Confirm Password">
            <p id="confirmPasswordError" class="error-message"></p>

            <button class="btn btn-register w-100 mt-2">Register</button>

        </div>

        <p class="mt-3">
            Already have an account?
            <a href="../login page/index.html">Login</a>
        </p>

    </div>

    <script src="script.js"></script>
</body>
</html>
