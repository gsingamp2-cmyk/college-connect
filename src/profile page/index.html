<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Connect - Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
        <div class="container-fluid">

                <a class="navbar-brand fw-bold" href="index.html">
                    College Connect
                </a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                    aria-controls="navbarNav"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">

                    <ul class="navbar-nav ms-auto">

                        <li class="nav-item">
                            <a class="nav-link active" href="../home page/index.html">
                                Home
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="../profile page/index.html">
                                Profile
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="../network page/index.html">
                                Network
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                Help
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link text-danger" href="../login page/index.html">
                                Logout
                            </a>
                        </li>

                    </ul>

                </div>

        </div>
    </nav>

    <div class="container mt-5">

        <h1 class="text-center mb-4">My Profile</h1>

        <h3 class="mb-3">Basic Information</h3>

        <input
            id="email"
            type="email"
            class="form-control mb-3"
            placeholder="Email ID"
        >

        <input
            id="branch"
            type="text"
            class="form-control mb-3"
            placeholder="Branch"
        >

        <input
            id="year"
            type="text"
            class="form-control mb-3"
            placeholder="Year"
        >

        <input
            id="college"
            type="text"
            class="form-control mb-4"
            placeholder="College Name"
        >

        <h3 class="mb-3">About Me</h3>

        <textarea
            id="about"
            class="form-control mb-4"
            rows="4"
            placeholder="Tell us about yourself..."
        ></textarea>

        <h3 class="mb-3">Skills</h3>

        <div class="d-flex w-50 gap-2 mb-3">
            <input
                id="skillInput"
                type="text"
                class="form-control"
                placeholder="Enter Skill"
            >

            <button
                id="addSkillBtn"
                class="btn btn-brown w-50"
            >
                Add Skill
            </button>
        </div>

        <div id="skillsContainer" class="mb-4"></div>

        <h3 class="mb-3">Projects</h3>

        <input
            id="projectName"
            type="text"
            class="form-control mb-2"
            placeholder="Project Name"
        >

        <textarea
            id="projectDescription"
            class="form-control mb-2"
            rows="3"
            placeholder="Project Description"
        ></textarea>

        <input
            id="githubLink"
            type="text"
            class="form-control mb-3"
            placeholder="GitHub Link"
        >

        <button
            id="addProjectBtn"
            class="btn btn-success mb-4"
        >
            Add Project
        </button>

        <div id="projectsContainer"></div>

        <h3 class="mb-3">Certifications</h3>

        <input
            id="certificationName"
            type="text"
            class="form-control mb-2"
            placeholder="Certification Name"
        >

        <input
            id="issuedBy"
            type="text"
            class="form-control mb-3"
            placeholder="Issued By"
        >

        <button
            id="addCertificationBtn"
            class="btn btn-info mb-4"
        >
            Add Certification
        </button>

        <div id="certificationsContainer"></div>

        <h3 class="mb-3">Activities & Leadership</h3>

        <input
            id="activityName"
            type="text"
            class="form-control mb-2"
            placeholder="Activity / Club / Role"
        >

        <textarea
            id="activityDescription"
            class="form-control mb-3"
            rows="3"
            placeholder="Description"
        ></textarea>

        <button
            id="addActivityBtn"
            class="btn btn-warning mb-4"
        >
            Add Activity
        </button>

        <div id="activitiesContainer"></div>

        <button
            id="saveBtn"
            class="btn btn-brown mb-2 mt-3"
        >
            Save Profile
        </button>

            </div>

    <script src="script.js"></script>

</body>
</html>
