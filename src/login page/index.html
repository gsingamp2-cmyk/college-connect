<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="login-container d-flex flex-column justify-content-center align-items-center">
    <h1 class="text-center mb-4">Start Exploring your College, Colleagues and Friends</h1>

    <div class="login-card mt-5 d-flex flex-column">
        <h2 class="mt-3">User id</h2>
        <input id="userId" type="text" class="form-control" placeholder="Enter your User ID"/>

        <h2 class="mt-3">Password</h2>
        <div class="password-container">
            <input type="password" class="form-control" id="password" placeholder="Enter Password">
            <i class="bi bi-eye" id="eyeIcon"></i>
        </div>
        
        <p class="mt-2 mb-0 forgot">Forgot password?</p>
        <button class="button" id="loginBtn">Login</button>
    </div>

    <h2 class="ortext"> or </h2>


    <a href="../register page/index.html">Create Account</a>

</div>

    <script src="script.js"></script>
</body>
</html>
